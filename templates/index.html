<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegetable AI Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🥬 Vegetable AI <span>Researcher</span></h1>
            <p>Advanced Identification System by Habibur Rahman Sajal</p>
        </header>

        <main>
            <div class="upload-section">
                <input type="file" id="imageInput" hidden>
                <label for="imageInput" class="upload-btn">📁 Upload Vegetable Image</label>
                <div id="previewContainer"></div>
                <button id="detectBtn" class="primary-btn">Analyze Image</button>
            </div>

            <div class="result-section" id="resultArea" style="display: none;">
                <h2>Detection Result</h2>
                <img id="outputImage" src="" alt="Result">
                <div id="detectionList"></div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
